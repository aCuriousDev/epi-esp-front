server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Hashed bundle output from Vite (filename includes a content hash, e.g.
    # /assets/index-mF-ZKUA8.js) — safe to mark immutable since the URL itself
    # changes when the bytes change.
    location ~* "^/assets/.+-[A-Za-z0-9_-]{8,}\.(js|css|woff|woff2|ttf|eot)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static assets that ship from /public with stable filenames (portraits,
    # favicons, glTF models, etc.). These can be re-uploaded with the same
    # name across deploys, so we must NOT mark them immutable — Discord's
    # activity proxy will then never re-fetch them. Cache for a day and
    # rely on the per-deploy ?v=APP_VERSION query string for cache-busting.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|glb|gltf|bin)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Catch-all for unhashed JS/CSS shipped from /public (rare).
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers — autoriser l’embed dans les activités Discord (*.discordsays.com)
    # Ne pas envoyer X-Frame-Options (sinon le navigateur refuse l'iframe Discord).
    add_header Content-Security-Policy "frame-ancestors 'self' https://*.discordsays.com https://discordsays.com https://discord.com https://*.discord.com" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
